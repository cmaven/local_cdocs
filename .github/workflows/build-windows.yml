# ============================================================
# build-windows.yml: Windows용 설치 파일(.exe) 자동 빌드 & 릴리스
# 상세: windows-latest 러너에서 electron-builder로 NSIS 인스톨러 + 포터블 exe 생성.
#       태그(v*) 푸시 시 GitHub Releases에 자동 첨부, 수동 실행 시 Artifacts로 업로드.
# 생성일: 2026-06-24
# ============================================================
name: Build Windows Installer

on:
  push:
    tags:
      - "v*"          # 예: v1.0.0 푸시 → 자동 빌드 + 릴리스 첨부
  workflow_dispatch:  # Actions 탭에서 수동 실행(테스트용, Artifacts로 다운로드)

permissions:
  contents: write     # 릴리스 생성/첨부에 필요

jobs:
  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # electron/build-info.json 생성 (SHA 7자리 + 빌드 날짜).
      # Windows 러너이므로 크로스플랫폼 안전한 node -e 사용.
      # electron-builder의 files 설정에 electron/**/* 가 포함되어 있어 자동으로 번들된다.
      # run 값에 콜론+공백({ sha: ... })이 있으면 평문 스칼라로는 YAML 파싱 오류 → 블록 스칼라(|) 사용.
      - name: Write build info
        run: |
          node -e "require('fs').writeFileSync('electron/build-info.json', JSON.stringify({ sha: process.env.GITHUB_SHA.slice(0,7), builtAt: new Date().toISOString().slice(0,10) }))"

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 수동 실행/일반 푸시: 빌드 결과를 Artifacts로 업로드(다운로드용)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: local-cdocs-windows
          path: |
            dist/*.exe
          if-no-files-found: error

      # 태그 푸시일 때만: GitHub Releases 페이지에 exe 자동 첨부
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
          generate_release_notes: true
