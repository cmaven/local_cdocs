<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>local-cdocs</title>
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'SUITE Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1b1b1f; color: #e8e8ea; gap: 18px;
    }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: .5px; }
    .spinner {
      width: 38px; height: 38px; border-radius: 50%;
      border: 3px solid #3a3a40; border-top-color: #6c8cff;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 13px; color: #a0a0a8; min-height: 18px; }
    .hint { font-size: 12px; color: #6a6a72; max-width: 320px; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="logo">local-cdocs</div>
  <div class="spinner"></div>
  <div class="status" id="status">문서 서버를 준비하는 중...</div>
  <div class="hint" id="hint"></div>
  <script>
    // 메인 프로세스가 보내는 상태 메시지를 표시
    if (window.localCdocs && window.localCdocs.onStatus) {
      window.localCdocs.onStatus((p) => {
        if (p && p.message) document.getElementById('status').textContent = p.message
        if (p && p.hint) document.getElementById('hint').textContent = p.hint
      })
      window.localCdocs.getCurrentFolder().then((f) => {
        if (f) document.getElementById('hint').textContent = f
      })
    }
  </script>
</body>
</html>
