# ============================================================
# electron-builder.yml: 크로스플랫폼 패키징 설정 (Windows + Linux)
# 상세: electron/, vitepress-core/, docs-template/, node_modules를 번들.
#       VitePress dev 서버를 런타임에 자식 프로세스로 띄우므로 node_modules 포함 필수.
#       동일 코드베이스로 Windows(NSIS 설치본)와 Linux(AppImage)를 생성한다.
#       portable 타깃은 제거됨(산출물 1개로 절감, 빌드 식별성 단순화).
# 생성일: 2026-06-22 | 수정일: 2026-07-08
# ============================================================
appId: com.cmaven.localcdocs
productName: local-cdocs
copyright: Copyright © 2026 cmaven

# asar 비활성화: VitePress가 node_modules/.bin/vitepress를 실제 파일로 spawn 해야 하므로
# (asar 내부 바이너리는 자식 프로세스로 직접 실행 불가) 압축 아카이브를 끈다.
asar: false

directories:
  output: dist
  buildResources: build

# 번들에 포함할 파일/폴더
files:
  - electron/**/*
  - vitepress-core/**/*
  - docs-template/**/*
  - package.json
  # node_modules는 dependencies만 자동 포함됨(electron-builder 기본).
  # vitepress는 devDependency라 명시적으로 포함해야 한다.
  - node_modules/**/*

# devDependency(vitepress 등)도 런타임에 필요하므로 prune 비활성
npmRebuild: false

win:
  target:
    - target: nsis
      arch:
        - x64
  # 아이콘 파일이 있으면 사용(build/icon.ico), 없으면 electron-builder 기본 아이콘.
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: local-cdocs

# ── Linux: AppImage(범용 단일 실행 파일) ──
# 아이콘 미지정 시 electron-builder 기본 아이콘 사용. AppImage는 설치 없이 실행권한만 주면 됨.
linux:
  target:
    - AppImage
  category: Utility
  synopsis: Local Markdown viewer (cdocs desktop edition)

appImage:
  artifactName: local-cdocs-${version}.AppImage
